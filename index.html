<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Silent Guard</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        .emergency-btn { background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 200px; height: 200px; font-size: 24px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.2s; }
        .emergency-btn:active { transform: scale(0.9); }
        #reader { width: 100%; max-width: 400px; margin: 20px auto; background: white; }
        .status { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
    </style>
</head>
<body>
    <h1>SILENT GUARD</h1>
    <p>Pindai QR Code di gerbong/bus sebelum melapor</p>
    
    <div id="reader"></div>
    <p id="location-info">Lokasi: Belum terdeteksi</p>

    <button class="emergency-btn" onclick="sendEmergency()">LAPOR<br>DARURAT</button>

    <div id="status-box" class="status"></div>

    <script>
        let detectedLocation = "";

        function onScanSuccess(decodedText) {
            detectedLocation = decodedText;
            document.getElementById('location-info').innerText = "Lokasi: " + decodedText;
            alert("Lokasi terdeteksi: " + decodedText);
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        function sendEmergency() {
            if (!detectedLocation) {
                alert("Scan QR Code di gerbong dulu!");
                return;
            }
            const statusBox = document.getElementById('status-box');
            statusBox.style.display = "block";
            statusBox.style.background = "#d4edda";
            statusBox.innerText = "Laporan Senyap Terkirim! Petugas menuju ke " + detectedLocation;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>

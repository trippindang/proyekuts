<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Campus Guard - Satgas PPKS</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #6c5ce7; --secondary: #a29bfe; --danger: #ff7675; --safe: #55efc4; --dark: #2d3436; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f0f2f5; color: var(--dark); padding-bottom: 70px; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .container { padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-action { border: none; border-radius: 12px; padding: 15px; font-weight: bold; color: white; cursor: pointer; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-danger { background: var(--danger); }
        .btn-info { background: var(--primary); }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 10px; display: none; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { cursor: pointer; font-size: 12px; color: #636e72; text-align: center; }
        .active { color: var(--primary); font-weight: bold; }
        #chat-section { display: none; height: 300px; overflow-y: auto; flex-direction: column; }
        .msg { margin: 5px 0; padding: 10px; border-radius: 10px; max-width: 80%; }
        .msg-bot { background: #e1eaf9; align-self: flex-start; }
        .msg-user { background: var(--primary); color: white; align-self: flex-end; }
    </style>
</head>
<body>

<header>
    <h2 style="margin:0">CAMPUS GUARD</h2>
    <p style="margin:5px 0; font-size:14px; opacity:0.9">Satgas PPKS & Anti-Bullying</p>
</header>

<div class="container" id="main-content">
    <div class="card" style="background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white;">
        <h3>Halo, Mahasiswa!</h3>
        <p>Butuh bantuan atau ingin melapor secara anonim? Kami ada untuk melindungimu.</p>
    </div>

    <div class="grid">
        <button class="btn-action btn-danger" onclick="toggleScanner()">
            <span>🚨</span><br>Lapor Cepat
        </button>
        <button class="btn-action btn-info" onclick="showSection('chat')">
            <span>💬</span><br>Curhat/Bot
        </button>
    </div>

    <div id="reader"></div>
    <p id="loc-status" style="text-align:center; font-weight:bold; color: var(--danger)"></p>

    <div class="card" id="chat-section">
        <div id="chat-box" style="display:flex; flex-direction:column">
            <div class="msg msg-bot">Halo! Saya Bot Campus Guard. Ada yang ingin kamu ceritakan secara anonim?</div>
        </div>
        <div style="display:flex; margin-top:10px">
            <input type="text" id="chat-input" style="flex:1; padding:10px; border-radius:5px; border:1px solid #ddd" placeholder="Ketik pesan...">
            <button onclick="sendChat()" style="padding:10px; background:var(--primary); color:white; border:none; border-radius:5px; margin-left:5px">Kirim</button>
        </div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showSection('home')">Home</div>
    <div class="nav-item" onclick="showSection('chat')">Curhat</div>
    <div class="nav-item" onclick="alert('Hotline Satgas: 0812-XXXX-XXXX')">Hotline</div>
</div>

<script>
    let currentLoc = "";

    function toggleScanner() {
        const reader = document.getElementById('reader');
        reader.style.display = reader.style.display === 'none' ? 'block' : 'none';
        if (reader.style.display === 'block') {
            let scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            scanner.render((text) => {
                currentLoc = text;
                document.getElementById('loc-status').innerText = "Lokasi Terdeteksi: " + text;
                alert("Laporan Senyap Terkirim dari " + text + ". Tetap tenang, Satgas menuju lokasi.");
                scanner.clear();
                reader.style.display = 'none';
            });
        }
    }

    function showSection(section) {
        document.getElementById('chat-section').style.display = section === 'chat' ? 'flex' : 'none';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(section === 'chat') document.querySelectorAll('.nav-item')[1].classList.add('active');
        else document.querySelectorAll('.nav-item')[0].classList.add('active');
    }

    function sendChat() {
        const input = document.getElementById('chat-input');
        const box = document.getElementById('chat-box');
        if (!input.value) return;

        const userMsg = document.createElement('div');
        userMsg.className = "msg msg-user";
        userMsg.innerText = input.value;
        box.appendChild(userMsg);

        setTimeout(() => {
            const botMsg = document.createElement('div');
            botMsg.className = "msg msg-bot";
            botMsg.innerText = "Laporan kamu telah kami terima secara anonim. Jika dalam kondisi bahaya, gunakan tombol 'Lapor Cepat'. Ingin kami hubungi lewat WhatsApp?";
            box.appendChild(botMsg);
            box.scrollTop = box.scrollHeight;
        }, 1000);

        input.value = "";
        box.scrollTop = box.scrollHeight;
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
